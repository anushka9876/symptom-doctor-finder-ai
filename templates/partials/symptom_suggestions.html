{% if results %}
  <ul style="list-style:none; margin:0; padding:0; border:1.5px solid #e5e7eb; border-radius:8px; overflow:hidden;">
    {% for symptom in results %}
      <li onclick="addSymptom('{{ symptom.name }}')"
          style="padding:10px 14px; cursor:pointer; font-size:14px; border-bottom:1px solid #f3f4f6;">
        {{ symptom.name }}
      </li>
    {% endfor %}
  </ul>
{% endif %}
