{% if results %}
  <ul class="suggestions-list">
    {% for symptom in results %}
      <li>
        <!-- Click suggestion → fill the textarea -->
        onclick="addSymptom('{{ symptom.name }}')"
        class="suggestion-item"
      
        {{ symptom.name }}
      </li>
    {% endfor %}
  </ul>
{% endif %}

<!-- Small JS to append clicked symptom to textarea -->
<script>
function addSymptom(name) {
  const ta = document.querySelector('textarea[name="symptoms_text"]');
  // Append symptom to existing text with comma
  ta.value = ta.value ? ta.value + ', ' + name : name;
  // Clear suggestions after selecting
  document.getElementById('suggestions').innerHTML = '';
}
</script>
