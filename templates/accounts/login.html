{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-card">
  <h2>Login</h2>

  <!-- action="" posts to the same URL, Django's LoginView handles it -->
  <form method="post" action="">
    {% csrf_token %}
    <!-- Django renders the form fields automatically -->
    {{ form.as_p }}
    <button type="submit">Login</button>
  </form>

  <p>No account? <a href="{% url 'accounts:register' %}">Register here</a></p>
</div>
{% endblock %}
