{% extends "base.html" %}
{% block title %}Check Symptoms{% endblock %}

{% block content %}
<div class="card">
  <h2>Describe your symptoms</h2>

  <div class="search-box">
    <input
      type="text"
      name="q"
      placeholder="Type symptom e.g. fever"
      hx-get="{% url 'symptoms:search' %}"
      hx-trigger="keyup delay:400ms"
      hx-target="#suggestions"
    >
    <div id="suggestions"></div>
  </div>

  <form
    method="post"
    hx-post="{% url 'symptoms:check' %}"
    hx-target="#results"
  >
    {% csrf_token %}
    <textarea name="symptoms_text" rows="4"
      placeholder="Describe your symptoms..."></textarea>

    <button type="submit">Check Symptoms</button>
  </form>

  <div id="results"></div>
</div>
{% endblock %}
